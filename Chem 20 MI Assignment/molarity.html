    <div class="content-box">
        <h2>Molarity</h2>
        <p>Molarity, also called molar concentration, is the amount of moles of solute in a certain volume of solution.</p>
    
        <p style="text-align: center; font-size: 1.2rem;">
            <b>Formula: M =  n/V</b>
        </p>

        <p>Where:</p>
        <ul>
            <li><b>M</b> = Molarity (mol/L)</li>
            <li><b>n</b> = Moles of solute (mol)</li>
            <li><b>V</b> = Volume of solution (L)</li>
        </ul>
    </div>

</body>
